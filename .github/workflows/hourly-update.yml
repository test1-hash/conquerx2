name: hourly-update

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'data/**'
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update ranking and build static site
        env:
          CX2_GAME_COOKIE: ${{ secrets.CX2_GAME_COOKIE }}
          CX2_GAME_USERID: ${{ secrets.CX2_GAME_USERID }}
          CX2_GAME_PASSWORD: ${{ secrets.CX2_GAME_PASSWORD }}
          CX2_GAME_SERVER_ID: ${{ secrets.CX2_GAME_SERVER_ID }}
          CX2_GAME_NICKNAME: ${{ secrets.CX2_GAME_NICKNAME }}
          CX2_GAME_DIRECTION: ${{ secrets.CX2_GAME_DIRECTION }}
          CX2_GAME_PREFER_BRANCH: ${{ secrets.CX2_GAME_PREFER_BRANCH }}
          CX2_GAME_SOURCE_URL: ${{ secrets.CX2_GAME_SOURCE_URL }}
          CX2_SOURCE_URL: ${{ secrets.CX2_SOURCE_URL }}
          CX2_SERVER_RANK_URL: ${{ secrets.CX2_SERVER_RANK_URL }}
        run: python manage.py update

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update CX2 rankings $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
